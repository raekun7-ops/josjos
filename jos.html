// ================= AUTO SPLIT =================
let questions = raw.split("\n").filter(q => q.trim() !== "");

// ================= CONFIG =================
let perPage = 4;
let currentPage = 0;
let selectedBest = null;
let selectedWorst = null;

// ================= RENDER =================
function render(){
    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let start = currentPage * perPage;
    let pageQ = questions.slice(start, start + perPage);

    document.getElementById("progress").innerText =
        `Halaman ${currentPage+1} / ${Math.ceil(questions.length/perPage)}`;

    pageQ.forEach((q,i)=>{
        let row = document.createElement("tr");

        row.innerHTML = `
        <td class="statement">${q}</td>
        <td class="option"><div class="circle" onclick="select(${i},'best',this)"></div></td>
        <td class="option"><div class="circle" onclick="select(${i},'worst',this)"></div></td>
        `;

        tbody.appendChild(row);
    });
}

// ================= SELECT =================
function select(i,type,el){

    if(type === 'best'){
        document.querySelectorAll("td:nth-child(2) .circle")
            .forEach(c=>c.classList.remove('selected'));

        selectedBest = i;
        el.classList.add('selected');
    }

    if(type === 'worst'){
        document.querySelectorAll("td:nth-child(3) .circle")
            .forEach(c=>c.classList.remove('selected'));

        selectedWorst = i;
        el.classList.add('selected');
    }
}

// ================= NEXT =================
function nextPage(){

    if(selectedBest === null || selectedWorst === null){
        document.getElementById("warning").innerText =
        "Wajib pilih 1 paling dan 1 tidak.";
        return;
    }

    if(selectedBest === selectedWorst){
        document.getElementById("warning").innerText =
        "Tidak boleh pilih pernyataan yang sama.";
        return;
    }

    // reset
    selectedBest = null;
    selectedWorst = null;
    document.getElementById("warning").innerText = "";

    currentPage++;

    if(currentPage >= Math.ceil(questions.length/perPage)){
        alert("Selesai semua soal!");
        return;
    }

    render();
}

// INIT
render();

</script>

</body>
</html>
